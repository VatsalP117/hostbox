services:
  hostbox:
    image: ghcr.io/VatsalP117/hostbox:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hostbox
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
    volumes:
      - hostbox_data:/app/data
      - hostbox_deployments:/app/deployments
      - hostbox_logs:/app/logs
      - hostbox_cache:/cache
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - CADDY_ADMIN_URL=http://caddy:2019
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hostbox

  caddy:
    image: ghcr.io/vatsalpatel/caddy:latest
    build:
      context: ./docker/caddy
    container_name: hostbox-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - hostbox_deployments:/app/deployments:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PLATFORM_DOMAIN=${PLATFORM_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN:-}
    command: caddy run --resume
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hostbox

volumes:
  hostbox_data:
  hostbox_deployments:
  hostbox_logs:
  hostbox_cache:
  caddy_data:
  caddy_config:

networks:
  hostbox:
    driver: bridge
